# Longarch2 全栈编排
# ------------------------------------------------------------------
#  一键启动:  cp .env.example .env  &&  docker compose up -d --build
#
#  服务:
#    mysql      MySQL 8           (数据持久化 -> mysql-data 卷)
#    redis      Redis 7           (密码保护)
#    mosquitto  MQTT broker       (设备指令/回调/遥测/心跳)
#    srs        SRS 媒体服务器    (摄像头 RTMP 推流 -> HTTP-FLV/HLS 播放)
#    server     Spring Boot 后端  (Flyway 自动建表, 端口 8081)
#    admin      React 管理后台    (nginx, 反代 /api 到 server)
#
#  默认以 dev profile 启动 (微信 stub 模式 + 自动播种管理员账号),
#  适合本地/演示验证。上线请参照 .env.example 切到 prod profile 并补齐密钥。
# ------------------------------------------------------------------

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-longarch}
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  srs:
    image: ossrs/srs:5
    restart: unless-stopped
    command: ["./objs/srs", "-c", "conf/srs.conf"]
    ports:
      - "${SRS_RTMP_PORT:-1935}:1935"   # RTMP 推流
      - "${SRS_API_PORT:-1985}:1985"    # 管理 API
      - "${SRS_HTTP_PORT:-8880}:8880"   # HTTP-FLV / HLS 播放
    volumes:
      - ./deploy/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro

  server:
    build:
      context: ./longarch-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
      srs:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # 数据源 (环境变量优先级高于 application-dev.yml 里的 localhost 默认值)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-longarch}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      # MQTT (容器内走服务名 mosquitto; 无证书明文 tcp://)
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-tcp://mosquitto:1883}
      MQTT_USERNAME: ${MQTT_USERNAME:-longarch}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-longarch123}
      MQTT_ALLOW_INSECURE: ${MQTT_ALLOW_INSECURE:-false}
      # 微信小程序凭据 (prod profile 必填; dev 用 application-dev.yml 的 stub 值)
      WX_APP_ID: ${WX_APP_ID:-}
      WX_APP_SECRET: ${WX_APP_SECRET:-}
      WX_MINIAPP_STUB_MODE: ${WX_MINIAPP_STUB_MODE:-true}
      # 智谱 AI (可选, 留空则 AI 功能不可用但不影响启动)
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      # 大屏令牌 (prod profile 必填)
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN:-}
      # SRS 媒体服务器: api-base 必须用服务名 (server 容器内 localhost 指向自身, 查不到推流);
      # flv/hls/rtmp base 是回给浏览器/小程序的播放地址, 演示默认 localhost, 上线用 .env 覆盖成你的域名
      SRS_API_BASE: http://srs:1985
      SRS_RTMP_BASE: ${SRS_RTMP_BASE:-rtmp://localhost:1935}
      SRS_HTTP_FLV_BASE: ${SRS_HTTP_FLV_BASE:-http://localhost:8880}
      SRS_HLS_BASE: ${SRS_HLS_BASE:-http://localhost:8880}
    ports:
      - "${SERVER_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  admin:
    build:
      context: ./longarch-admin-next
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${ADMIN_PORT:-8080}:80"

volumes:
  mysql-data:
  redis-data:
  mosquitto-data:
