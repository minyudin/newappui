# Longarch SRS 媒体服务器配置
# 推流(ingest):   RTMP      rtmp://<host>:1935/<app>/<stream>
# 播放(playback): HTTP-FLV  http://<host>:8880/<app>/<stream>.flv   (应用主用, 低延迟)
#                 HLS       http://<host>:8880/<app>/<stream>.m3u8  (兼容备用)
# 管理 API:       http://<host>:1985/api/v1/   (后端查询活跃推流用)
listen              1935;
max_connections     100;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8880;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    # HTTP-FLV 低延迟直播
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
    # HLS 备用 (切片写到 http_server 根目录下, 才能通过 8880 拉到 .m3u8)
    hls {
        enabled     on;
        hls_path    ./objs/nginx/html;
        hls_fragment 2;
        hls_window  10;
    }
}
